services:
  # Web Service
  - type: web
    name: smartseason-backend
    runtime: node
    plan: free
    env: node
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: smartseason-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartseason-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smartseason-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: smartseason-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartseason-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: smartseason-db
    plan: free
    runtime: postgres
    databaseName: smartseason
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
